<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callis — Test Plain HTML</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header { background: #f0f0f0; padding: 20px; border-radius: 8px; margin-bottom: 32px; }
        nav a { margin-right: 16px; color: #0066cc; text-decoration: none; }
        .hero { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 60px; border-radius: 12px; margin-bottom: 32px; }
        .hero h1 { margin: 0 0 12px; }
        .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; }
        .card h3 { margin: 0 0 8px; font-size: 15px; }
        footer { border-top: 1px solid #eee; padding-top: 20px; color: #888; font-size: 13px; }
    </style>
</head>
<body data-role="admin" data-plan="pro">
    <header>
        <nav>
            <a href="#" data-callis="nav-home">Accueil</a>
            <a href="#" data-callis="nav-projects">Projets</a>
            <a href="#" data-callis="nav-settings">Paramètres</a>
        </nav>
    </header>

    <section class="hero" data-callis="hero-section">
        <h1>Dashboard principal</h1>
        <p>Bienvenue dans l'application de test Callis.</p>
        <button data-callis="btn-create" style="padding: 10px 20px; background: #fff; color: #667eea; border: none; border-radius: 6px; cursor: pointer;">
            Créer un projet
        </button>
    </section>

    <div class="card-grid">
        <div class="card" data-callis="card-analytics">
            <h3>Analytics</h3>
            <p>12,450 vues ce mois</p>
        </div>
        <div class="card" id="card-users">
            <h3>Utilisateurs</h3>
            <p>248 actifs</p>
        </div>
        <div class="card">
            <h3>Conversion</h3>
            <p>3.2%</p>
        </div>
    </div>

    <footer>
        <p>Page de test Callis — isolation Shadow DOM et sélecteurs</p>
    </footer>

    <script>
        // Pour tester le bookmarklet, copier ce script dans la console :
        // (function(){var s=document.createElement('script');s.src='../../dist/callis.js';document.head.appendChild(s);})()
        // Ou charger directement le bundle en dev :
    </script>
    <script type="module">
        const s = document.createElement('script')
        s.src = '../dist/callis.js'
        document.head.appendChild(s)
        s.onload = () => {
            setTimeout(() => window.__callis?.toggle(), 300)
        }
    </script>
</body>
</html>
